<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Surprise 🎁</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Confetti Library -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

  <!-- Background Music & Sounds -->
  <audio id="sound-countdown" src="countdown.mp3" preload="auto"></audio>
  <audio id="sound-rocket" src="rocket.mp3" preload="auto"></audio>
  <audio id="bg-music" src="bg-music.mp3" loop preload="auto"></audio>

  <div class="container">
    
    <!-- STEP 1: Gift Box -->
    <div id="gift-screen" class="screen active">
      <p class="tap-text">Tap the Gift 🎁</p>
      <img id="gift-box" src="gift.png" alt="Gift Box" />
    </div>

    <!-- STEP 2: Countdown -->
    <div id="countdown-screen" class="screen">
      <h1 id="countdown-timer">3</h1>
    </div>

    <!-- STEP 3: Rocket & Eyes View -->
    <div id="rocket-screen" class="screen">
      <div class="eyes-watermark"></div>
      <canvas id="fireworks-canvas"></canvas>
    </div>

    <!-- STEP 4: Greeting Template -->
    <div id="template-screen" class="screen">
      <img src="birthday-template.png" alt="Happy Birthday" class="template-img" />
    </div>

    <!-- STEP 5: Typewriter Letter -->
    <div id="letter-screen" class="screen">
      <div class="letter-card">
        <div class="sketch-watermark"></div>
        <div id="typewriter-text" class="typewriter-content"></div>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
