<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Link Preview Suspense Title -->
    <title>A Special Gift For You...🎁</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,500;0,700;0,800;1,500&family=Poppins:wght=400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- BACKGROUND SYSTEMS -->
    <div class="stars"></div>
    <canvas id="effectCanvas"></canvas>
    <div id="rainContainer"></div>

    <!-- AUDIO ELEMENTS -->
    <audio id="countdownAudio" src="countdown.mp3" preload="auto"></audio>
    <audio id="bgMusic" src="bg-music.mp3" preload="auto" loop></audio>

    <!-- MAIN APP WRAPPER -->
    <div class="container">

        <!-- STEP 2: GIFT BOX SCREEN -->
        <div id="giftSection">
            <img id="giftBox" class="gift-img" src="gift.png" alt="Special Gift for You">
            <p class="tap-text">Tap on the Gift Box to Open! ✨</p>
        </div>

        <!-- STEP 5: COUNTDOWN TIMER -->
        <div id="countdownScreen" class="hidden">
            <div id="countdownNumber">3</div>
        </div>

        <!-- STEP 6: HAPPY BIRTHDAY FLASH SCREEN (Suspense Maintained) -->
        <div id="bdayGreetingScreen" class="hidden">
            <h1 class="bday-text">HAPPY BIRTHDAY! 💖</h1>
        </div>

        <!-- STEP 7: PHOTO MEMORY SCREEN (15 SECONDS) -->
        <div id="templateSection" class="hidden template-wrapper">
            <img class="template-img" src="birthday-template.png" alt="Birthday Special Memory">
        </div>

        <!-- NEW STEP: INTERACTIVE 3D CAKE CUTTING SCREEN -->
        <div id="cakeSection" class="hidden cake-wrapper">
            <h2 class="cake-title">Future Nurse Gungun,<br>Make a Wish! 🩺🎂</h2>
            <div class="cake-container">
                <div class="nurse-cap">👩‍⚕️🩺</div>
                <div id="cake3D" class="cake">
                    <div class="cake-top"></div>
                    <div class="cake-side"></div>
                    <div class="frosting-text">Happy Birthday Gungun</div>
                    <div class="candle">
                        <div class="flame" id="candleFlame"></div>
                    </div>
                </div>
            </div>
            <p id="cakeInstruction" class="cake-tap-text">Tap the Cake to Blow the Candle! 🕯️</p>
        </div>

        <!-- STEP 8: NOTEBOOK LETTER SCRAPBOOK -->
        <div id="messageSection" class="hidden scroll-letter">
            <div id="typewriterText" class="letter-text"></div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
