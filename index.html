<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Background -->
    <div class="background"></div>

    <!-- Floating Effects -->
    <div id="stars"></div>
    <div id="hearts"></div>
    <div id="petals"></div>

    <!-- Gift Screen -->
    <section id="giftSection" class="screen">

        <h2 class="tapText">🎁 Tap The Gift 🎁</h2>

        <img src="images/gift-box.png"
             id="giftBox"
             alt="Gift Box">

    </section>

    <!-- Countdown Screen -->
    <section id="countdownSection" class="screen hidden">

        <h1 id="countdown">3</h1>

    </section>

    <!-- Birthday Screen -->
    <section id="birthdaySection" class="screen hidden">

        <img src="images/birthday-template.png"
             id="birthdayTemplate"
             alt="Happy Birthday">

    </section>

    <!-- Countdown Sound -->
    <audio id="countdownMusic">
        <source src="music/countdown.mp3" type="audio/mpeg">
    </audio>

    <!-- Birthday Music -->
    <audio id="birthdayMusic" loop>
        <source src="music/birthday.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>

</body>
</html>
