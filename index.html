<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Special Surprise</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #050505;
      color: #fff;
      font-family: 'Georgia', serif;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Background Eyes Image */
    #bg-eyes {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('bg-eyes.jpg') no-repeat center center/cover;
      opacity: 0;
      transition: opacity 0.8s ease-in-out;
      z-index: 1;
    }

    #bg-eyes.glow {
      opacity: 0.3; /* Blast ke time subtle glow */
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 2;
      pointer-events: none;
    }

    #main-container {
      position: relative;
      z-index: 3;
      text-align: center;
      width: 90%;
      max-width: 450px;
    }

    .btn {
      padding: 15px 30px;
      font-size: 1.2rem;
      background: #ff4757;
      color: #fff;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(255,71,87,0.5);
    }

    .hidden {
      display: none !important;
    }

    /* Gift Image */
    #gift-box img {
      width: 120px;
      cursor: pointer;
      animation: bounce 1.5s infinite;
      margin-top: 20px;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    /* Card & Sketch Layout */
    #card-container {
      background: rgba(15, 15, 15, 0.88);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 20px;
      border-radius: 15px;
      margin-top: 10px;
      backdrop-filter: blur(8px);
    }

    .template-bg {
      background: url('birthday-template.png') no-repeat center/cover;
      padding: 15px;
      border-radius: 10px;
    }

    .sketch-frame img {
      width: 100%;
      max-height: 250px;
      object-fit: cover;
      border-radius: 8px;
      border: 2px solid #fff;
      margin-bottom: 15px;
    }

    .typewriter-box p {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #fff;
      text-align: left;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <!-- Background Eyes Overlay -->
  <div id="bg-eyes"></div>

  <!-- Fireworks Canvas -->
  <canvas id="fireworksCanvas"></canvas>

  <div id="main-container">
    <!-- Tap Button (Required for Mobile Audio) -->
    <button id="start-btn" class="btn" onclick="startSurprise()">Tap to Open ✨</button>

    <!-- Countdown Timer -->
    <div id="countdown-box" class="hidden">
      <h1 id="timer" style="font-size: 3rem;">00:00:05</h1>
    </div>

    <!-- Surprise Section -->
    <div id="surprise-section" class="hidden">
      
      <!-- Interactive Gift Box -->
      <div id="gift-box" onclick="openGift()">
        <img src="gift.png" alt="Gift">
        <p style="margin-top: 8px; font-size: 0.9rem;">Tap the gift box!</p>
      </div>

      <!-- Sketch, Template & Typewriter Letter -->
      <div id="card-container" class="hidden">
        <div class="template-bg">
          <div class="sketch-frame">
            <img src="sketch.png" alt="Sketch">
          </div>
          <div class="typewriter-box">
            <p id="typewriter-text"></p>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Audio Files (Mapped directly to repo root) -->
  <audio id="bgMusic" src="bg-music.mp3" loop></audio>
  <audio id="countdownAudio" src="countdown.mp3"></audio>
  <audio id="blastAudio" src="explosion.mp3"></audio>

  <script src="script.js"></script>
</body>
</html>
